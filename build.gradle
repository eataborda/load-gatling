plugins {
    id 'scala'
    id 'io.gatling.gradle' version '3.14.9.2'
}

group 'com.github.eataborda.gatling'
version '1.0-SNAPSHOT'


repositories {
    mavenCentral()
}

gatling {
    scalaVersion = '2.13.12'
}

dependencies {
    // Scala version to use for compilation
    implementation 'org.scala-lang:scala-library:2.13.12'
    // Gatling plugin
    gatling 'org.scala-lang:scala-library:2.13.12'
}
